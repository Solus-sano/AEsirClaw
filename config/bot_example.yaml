llm:
  provider: moonshot
  model: kimi-k2.5
  model_base_url: https://api.moonshot.cn/v1
  api_key: Your-API-Key
  max_iterations: 500

memory:
  init_short_term_messages: 30
  context_short_term_messages: 30
  short_term_queue_size: 500
  extraction_threshold: 500
  cross_group_memory: false
  profiles_dir: agent_core/memory/profiles
  summaries_dir: agent_core/memory/summaries

routing:
  defaults:
    persona_file: persona_firefly.yaml
    trigger:
      keywords: []
      group_cooldown_seconds: 1800
      private_cooldown_seconds: 0.1
    output:
      typing_delay_per_char: 0.5    # 每字符延迟（秒）
      random_delay_range: [2.0, 4.0] # 随机波动范围（秒）
      max_delay: 10.0                 # 最大延迟上限（秒）
  groups:
    # "Group-ID-1":
    #   persona_file: personal_xlpj.yaml
    #   trigger:
    #     keywords: ["关键词"]
    #     group_cooldown_seconds: 300
    #   output:
    #     typing_delay_per_char: 0.3
    #     random_delay_range: [1.0, 2.5]
    #     max_delay: 6.0
  users:
    # "User-ID-1":
    #   persona_file: personal_xlpj.yaml
    #   trigger:
    #     private_cooldown_seconds: 0.1
    #   output:
    #     typing_delay_per_char: 0.1
    #     random_delay_range: [0.1, 0.5]
    #     max_delay: 2.0

bot_config:
  bot_qq: "Your-Bot-QQ"
  group_whitelist: ["Group-ID-1","Group-ID-2"]
  private_whitelist: ["User-ID-1","User-ID-2"]
  ws_uri: ws://localhost:45115
  ws_token: "Your-WS-Token"
